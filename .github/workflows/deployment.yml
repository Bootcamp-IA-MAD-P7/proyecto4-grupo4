name: Deploy Unicorn Valuation to EC2

# ─────────────────────────────────────────────────────────────────────────────
# Trigger: every push to main (production) or workflow_dispatch for manual runs
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Quality gate: run the full pytest suite against SQLite (no Docker)
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Train model (with --allow-low-r2-artifact flag for CI)
        working-directory: backend
        run: python scripts/train.py --report --allow-low-r2-artifact

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker images and push to Docker Hub
  # Depends on: test (must pass)
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" \
            | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Backend — the Dockerfile already runs scripts/train.py inside the image
      - name: Build and push backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/unicorn-api:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/unicorn-api:${{ github.sha }} \
            ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/unicorn-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/unicorn-api:${{ github.sha }}

      # Frontend — VITE_API_URL is baked into the static bundle at build time.
      # Secret VITE_API_URL must be set to http://34.235.130.33:8004
      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            -t ${{ secrets.DOCKER_USERNAME }}/unicorn-frontend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/unicorn-frontend:${{ github.sha }} \
            ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/unicorn-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/unicorn-frontend:${{ github.sha }}

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy on EC2 via SSH
  # Pulls images from Docker Hub and (re)starts containers with docker compose
  #
  # EC2 production server: 34.235.130.33 (configured via secret EC2_HOST)
  #
  # Port mapping (Security Group must have these open as Inbound rules):
  #   API      → host 8004  → container 8000
  #   Frontend → host 3005  → container 80  (nginx)
  #   DB       → internal only (Docker network); external 5434 for debugging
  #
  # Port 5432 on the host is already occupied by another PostgreSQL instance.
  # The project DB listens on 5434 externally (POSTGRES_HOST_PORT=5434).
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # Copy the production compose file to the server
      - name: Upload docker-compose.prod.yml
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/unicorn/docker-compose.prod.yml

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            bash -s << 'ENDSSH'
            set -e

            # ── Docker Hub login ──────────────────────────────────────────────
            echo "${{ secrets.DOCKER_PASSWORD }}" \
              | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # ── Pull latest images ────────────────────────────────────────────
            docker pull ${{ secrets.DOCKER_USERNAME }}/unicorn-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/unicorn-frontend:latest

            # ── Stop / remove old containers gracefully ───────────────────────
            docker container stop unicorn_api unicorn_frontend unicorn_db 2>/dev/null || true
            docker container rm  unicorn_api unicorn_frontend unicorn_db 2>/dev/null || true

            # ── Start stack with docker compose (prod file) ───────────────────
            cd ~/unicorn
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
            POSTGRES_HOST_PORT=5434 \
              docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── Internal smoke tests (from within EC2) ────────────────────────
            sleep 15
            echo "→ Checking API health on port 8004..."
            curl --fail --silent http://localhost:8004/health | grep '"status":"ok"'
            echo "→ Checking frontend on port 3005..."
            curl --fail --silent --output /dev/null --write-out "%{http_code}" http://localhost:3005 | grep -E "^(200|301|302)$"
            echo "✅ Internal smoke tests passed"
          ENDSSH

      # ── External validation from GitHub Actions runner ────────────────────
      # Confirms both services are reachable from the public internet.
      # EC2_HOST = 34.235.130.33 (set in GitHub Secrets → environment: production)
      - name: External smoke test (API :8004 + Frontend :3005)
        run: |
          echo "→ Verifying API externally on http://${{ secrets.EC2_HOST }}:8004/health ..."
          curl --fail --silent --retry 3 --retry-delay 5 \
            "http://${{ secrets.EC2_HOST }}:8004/health" | grep '"status":"ok"'

          echo "→ Verifying frontend externally on http://${{ secrets.EC2_HOST }}:3005 ..."
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" --retry 3 --retry-delay 5 \
            "http://${{ secrets.EC2_HOST }}:3005")
          echo "Frontend HTTP status: $STATUS"
          [[ "$STATUS" =~ ^(200|301|302)$ ]] || (echo "Frontend not reachable" && exit 1)

          echo "✅ Deployment successful — unicorn stack is live at http://${{ secrets.EC2_HOST }}:3005"
